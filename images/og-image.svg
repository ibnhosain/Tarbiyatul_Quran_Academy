<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#123f28"/>
      <stop offset="60%" style="stop-color:#1a5c3a"/>
      <stop offset="100%" style="stop-color:#2a7a50"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9962a"/>
      <stop offset="100%" style="stop-color:#f0c355"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <circle cx="950" cy="100" r="320" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1050" cy="530" r="220" fill="rgba(255,255,255,0.025)"/>
  <circle cx="100" cy="500" r="180" fill="rgba(255,255,255,0.02)"/>
  <!-- Gold accent line -->
  <rect x="80" y="290" width="6" height="120" fill="url(#gold)" rx="3"/>
  <!-- Logo box -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="rgba(255,255,255,0.12)"/>
  <text x="116" y="128" font-family="serif" font-size="36" text-anchor="middle" fill="#f0c355">📖</text>
  <!-- Academy name -->
  <text x="172" y="112" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#ffffff">Tarbiyatul Quran Academy</text>
  <text x="172" y="140" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">Online Quran Classes · Worldwide</text>
  <!-- Main headline -->
  <text x="80" y="230" font-family="Georgia,serif" font-size="58" font-weight="800" fill="#ffffff">Online Quran Classes</text>
  <text x="80" y="300" font-family="Georgia,serif" font-size="52" font-weight="800" fill="#f0c355">for Families Abroad</text>
  <!-- Description -->
  <text x="92" y="380" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.82)">1-to-1 · Tajweed · Islamic Manners · Flexible Timing</text>
  <!-- Country badges -->
  <text x="92" y="450" font-family="Arial,sans-serif" font-size="28">🇺🇸 🇬🇧 🇨🇦 🇩🇪 🇫🇷 🇦🇺 🇳🇱 🇸🇪</text>
  <!-- CTA -->
  <rect x="80" y="500" width="280" height="56" rx="12" fill="url(#gold)"/>
  <text x="220" y="535" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">Book Free Trial Class</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="end">tarbiyatulquranacademy.com</text>
</svg>
